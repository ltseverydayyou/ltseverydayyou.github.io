name: Probe WEAO changelog API data

on:
  push:
    branches:
      - chore/weao-changelog-probe-data-20260716

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Remove branch when marked
        if: ${{ hashFiles('delete-probe-branch') != '' }}
        run: git push origin --delete "$GITHUB_REF_NAME"

      - name: Probe documentation and API
        if: ${{ hashFiles('delete-probe-branch') == '' && hashFiles('probe-output.json') == '' }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const headers = { "User-Agent": "WEAO-3PService" };

          async function read(url, options = {}) {
              try {
                  const response = await fetch(url, options);
                  const text = await response.text();
                  return {
                      url,
                      status: response.status,
                      contentType: response.headers.get("content-type") || "",
                      text
                  };
              } catch (error) {
                  return { url, status: 0, contentType: "", text: String(error) };
              }
          }

          const output = {
              generatedAt: new Date().toISOString(),
              docs: {},
              statuses: {},
              sample: {},
              candidates: []
          };

          const docs = await read("https://docs.weao.xyz/weao-api-reference/exploits");
          output.docs.status = docs.status;
          output.docs.contentType = docs.contentType;
          output.docs.length = docs.text.length;
          output.docs.matches = [];
          const lowerDocs = docs.text.toLowerCase();
          let offset = 0;
          while (output.docs.matches.length < 30) {
              const index = lowerDocs.indexOf("changelog", offset);
              if (index === -1) break;
              output.docs.matches.push(docs.text.slice(Math.max(0, index - 1400), index + 2800));
              offset = index + 9;
          }

          const statuses = await read("https://weao.xyz/api/status/exploits", { headers });
          output.statuses.status = statuses.status;
          output.statuses.contentType = statuses.contentType;
          output.statuses.preview = statuses.text.slice(0, 1600);

          let entries = [];
          try {
              const parsed = JSON.parse(statuses.text);
              entries = Array.isArray(parsed) ? parsed : Array.isArray(parsed?.data) ? parsed.data : [];
          } catch {}

          const sample = entries.find((entry) => entry?.title) || {};
          const title = String(sample.title || "Solara");
          const id = String(sample._id || "");
          const slugCandidates = [
              title,
              sample.slug,
              sample.slug?.slug,
              sample.slug?.name,
              id
          ].filter((value) => typeof value === "string" && value.trim());

          output.sample = {
              title,
              id,
              slug: sample.slug ?? null,
              entry: sample
          };

          const urls = new Set([
              "https://weao.xyz/api/status/exploits/changelogs",
              "https://weao.xyz/api/status/exploits/changelog",
              "https://weao.xyz/api/changelogs/exploits",
              "https://weao.xyz/api/changelog/exploits",
              "https://weao.xyz/api/exploits/changelogs",
              "https://weao.xyz/api/exploits/changelog"
          ]);

          for (const value of slugCandidates) {
              const encoded = encodeURIComponent(value);
              [
                  `/api/status/exploits/${encoded}/changelogs`,
                  `/api/status/exploits/${encoded}/changelog`,
                  `/api/status/exploits/changelogs/${encoded}`,
                  `/api/status/exploits/changelog/${encoded}`,
                  `/api/changelogs/exploits/${encoded}`,
                  `/api/changelog/exploits/${encoded}`,
                  `/api/exploits/${encoded}/changelogs`,
                  `/api/exploits/${encoded}/changelog`,
                  `/api/changelogs/${encoded}`,
                  `/api/changelog/${encoded}`
              ].forEach((path) => urls.add(`https://weao.xyz${path}`));
          }

          for (const url of urls) {
              const result = await read(url, { headers });
              output.candidates.push({
                  url,
                  status: result.status,
                  contentType: result.contentType,
                  body: result.text.slice(0, 5000)
              });
          }

          fs.writeFileSync("probe-output.json", `${JSON.stringify(output, null, 2)}\n`, "utf8");
          NODE

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add probe-output.json
          git commit -m "chore: store WEAO probe output [skip ci]"
          git push
