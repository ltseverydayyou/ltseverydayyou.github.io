name: Apply WEAO changelog feature

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feature/weao-executor-changelogs'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Apply executor changelog UI
        run: |
          base64 --decode scripts/weao-ui-patch.b64 > /tmp/weao-ui-patch.mjs
          python - <<'PY'
          from pathlib import Path
          path = Path('/tmp/weao-ui-patch.mjs')
          source = path.read_text()
          source = source.replace(
              '`        let executorCache = [];\n        let executorCacheFetchedAt = null;`',
              '"        let executorCacheFetchedAt = null;"'
          )
          path.write_text(source)
          PY
          set +e
          {
            node --check /tmp/weao-ui-patch.mjs
            CHECK_STATUS=$?
            if [ "$CHECK_STATUS" -eq 0 ]; then
              node /tmp/weao-ui-patch.mjs
              RUN_STATUS=$?
            else
              RUN_STATUS=0
            fi
          } > weao-ui-patch-result.txt 2>&1
          set -e
          if [ "$CHECK_STATUS" -ne 0 ] || [ "$RUN_STATUS" -ne 0 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add weao-ui-patch-result.txt
            git commit -m "chore: store WEAO UI patch failure [skip ci]"
            git push origin HEAD:${{ github.head_ref }}
            cat weao-ui-patch-result.txt
            exit 1
          fi
          rm -f weao-ui-patch-result.txt

      - name: Generate and validate WEAO cache
        run: |
          node --check scripts/weao-cache.js
          node scripts/weao-cache.js
          node <<'NODE'
          const fs = require("node:fs");
          const html = fs.readFileSync("index.html", "utf8");
          for (const marker of [
              "executorChangelogCacheUrl",
              "createExecutorChangelogSection",
              "await loadExecutorChangelogCache();",
              ".executor-card__changelog {"
          ]) {
              if (!html.includes(marker)) {
                  throw new Error(`Missing UI marker: ${marker}`);
              }
          }

          const payload = JSON.parse(
              fs.readFileSync(".well-known/weao/executor-changelogs.json", "utf8")
          );
          const entries = Object.values(payload?.data?.entries || {});
          if (payload?.data?.mode !== "per-exploit" || !entries.length) {
              throw new Error("Invalid WEAO changelog cache.");
          }
          const populated = entries.some((entry) =>
              Array.isArray(entry?.response?.changelogs) &&
              entry.response.changelogs.length > 0
          );
          if (!populated) {
              throw new Error("No populated WEAO changelog response was cached.");
          }
          NODE

      - name: Commit generated files
        run: |
          if git diff --quiet index.html .well-known/weao; then
            echo "Generated files are unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .well-known/weao/versions.json .well-known/weao/executors.json .well-known/weao/executor-changelogs.json
          git commit -m "feat: generate WEAO executor changelogs [skip ci]"
          git push origin HEAD:${{ github.head_ref }}
