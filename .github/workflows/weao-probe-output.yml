name: Apply WEAO executor changelogs

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feat/weao-executor-changelogs-20260716'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate scripts
        run: |
          node --check scripts/apply-weao-changelog-ui.js
          node --check scripts/weao-cache.js

      - name: Apply changelog UI
        run: node scripts/apply-weao-changelog-ui.js

      - name: Generate WEAO cache
        run: node scripts/weao-cache.js

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .well-known/weao/versions.json .well-known/weao/executors.json .well-known/weao/executor-changelogs.json
          if git diff --cached --quiet; then
            echo "Generated files are already current."
            exit 0
          fi
          git commit -m "feat: apply WEAO executor changelogs [skip ci]"
          git push origin HEAD:${{ github.head_ref }}
