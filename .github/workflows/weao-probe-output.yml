name: Probe WEAO changelog API

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  probe:
    if: github.head_ref == 'chore/run-weao-pr-probe-20260716'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Probe WEAO
        run: |
          curl -fsSL https://raw.githubusercontent.com/ltseverydayyou/ltseverydayyou.github.io/main/scripts/weao-probe.js | node
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add probe-output.json
          if git diff --cached --quiet; then
            echo "Probe output unchanged."
            exit 0
          fi
          git commit -m "chore: store WEAO probe output [skip ci]"
          git push origin HEAD:${{ github.head_ref }}
