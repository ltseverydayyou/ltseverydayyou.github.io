name: Probe WEAO changelog API

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe WEAO
        run: curl -fsSL https://raw.githubusercontent.com/ltseverydayyou/ltseverydayyou.github.io/main/scripts/weao-probe.js | node
