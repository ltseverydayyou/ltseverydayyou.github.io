name: Diagnose WEAO changelog feature

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  diagnose:
    if: github.head_ref == 'feat/weao-executor-changelogs-20260716'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Capture migration result
        run: |
          set +e
          node scripts/apply-weao-changelog-ui.js > .weao-migration-diagnostic.txt 2>&1
          status=$?
          printf "\nexit_code=%s\n" "$status" >> .weao-migration-diagnostic.txt
          exit 0

      - name: Commit diagnostic
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .weao-migration-diagnostic.txt
          git commit -m "chore: capture WEAO migration diagnostic [skip ci]"
          git push origin HEAD:${{ github.head_ref }}
