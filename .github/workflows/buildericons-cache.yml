name: Refresh BuilderIcons cache

on:
  schedule:
    - cron: "0 0 * * *" # every day at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install fonttools

      - name: Update BuilderIcons cache
        run: python scripts/buildericons-cache.py

      - name: Commit changes
        run: |
          if git diff --quiet .well-known/buildericons/icons.json; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .well-known/buildericons/icons.json
          git commit -m "chore: refresh BuilderIcons cache [skip ci]"
          git push
